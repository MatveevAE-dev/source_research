<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Справочник источников</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">
      <span class="header__icon" aria-hidden="true">🌐</span>
      Справочник источников
    </h1>
    <div class="header__actions">
      <button type="button" class="btn btn--secondary" id="btn-instruction" aria-label="Инструкция по категориям">
        <span class="btn__icon">ℹ️</span>
        Инструкция по категориям
      </button>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLScA_Bf0ZfPakvtQfVltd92dL2anAhSgFUSRAw2n1QuaSVEeDA/viewform" target="_blank" rel="noopener noreferrer" class="btn btn--primary" id="btn-add-source">
        <span class="btn__icon">➕</span>
        Добавить новый источник
      </a>
    </div>
  </header>

  <main class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <label for="search" class="visually-hidden">Поиск по названию или описанию</label>
        <input type="search" id="search" class="search" placeholder="Поиск по названию или описанию..." autocomplete="off">
      </div>
      <div class="filters">
        <div class="filter-group filter-multi">
          <span class="filter-label">Направление</span>
          <div class="filter-dropdown" data-filter="direction">
            <button type="button" class="filter-dropdown__trigger" id="trigger-direction" aria-expanded="false" aria-haspopup="listbox" aria-label="Выбрать направления">
              <span class="filter-dropdown__label">Все направления</span>
              <span class="filter-dropdown__arrow" aria-hidden="true">▼</span>
            </button>
            <div class="filter-dropdown__panel" id="panel-direction" role="listbox" hidden></div>
          </div>
        </div>
        <div class="filter-group filter-multi">
          <span class="filter-label">Категория</span>
          <div class="filter-dropdown" data-filter="category">
            <button type="button" class="filter-dropdown__trigger" id="trigger-category" aria-expanded="false" aria-haspopup="listbox" aria-label="Выбрать категории">
              <span class="filter-dropdown__label">Все категории</span>
              <span class="filter-dropdown__arrow" aria-hidden="true">▼</span>
            </button>
            <div class="filter-dropdown__panel" id="panel-category" role="listbox" hidden></div>
          </div>
        </div>
        <div class="filter-group filter-multi">
          <span class="filter-label">Страна</span>
          <div class="filter-dropdown" data-filter="country">
            <button type="button" class="filter-dropdown__trigger" id="trigger-country" aria-expanded="false" aria-haspopup="listbox" aria-label="Выбрать страны">
              <span class="filter-dropdown__label">Все страны</span>
              <span class="filter-dropdown__arrow" aria-hidden="true">▼</span>
            </button>
            <div class="filter-dropdown__panel" id="panel-country" role="listbox" hidden></div>
          </div>
        </div>
      </div>
    </div>

    <div id="loading" class="loading" role="status" aria-live="polite">
      Загрузка данных…
    </div>
    <div id="error" class="error hidden" role="alert"></div>
    <div id="content" class="content hidden"></div>
  </main>

  <aside id="modal-instruction" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc" hidden>
    <div class="modal__backdrop" id="modal-backdrop"></div>
    <div class="modal__panel">
      <div class="modal__header">
        <h2 id="modal-title" class="modal__title">Инструкция по категориям</h2>
        <button type="button" class="modal__close" id="modal-close" aria-label="Закрыть">×</button>
      </div>
      <div id="modal-desc" class="modal__body">
        <p class="modal__intro">Отфильтруйте список по интересующему направлению, стране или категории. Источники из направления «Общие» следует подбирать исходя из цели анализа по категории.</p>
        <div id="instruction-list" class="instruction-list"></div>
      </div>
    </div>
  </aside>

  <script src="js/app.js"></script>
</body>
</html>
